<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webex Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0d14;
      --bg-nav:     #0d1020;
      --bg-hover:   #1a1d2e;
      --bg-active:  #1a2a40;
      --border:     #1e2240;
      --text-muted: #5a6080;
      --text-dim:   #8090b8;
      --text:       #d4d8e1;
      --accent:     #60a5fa;
      --rail-width: 52px;
      --bar-height: 56px;
    }

    html, body { height: 100%; background: var(--bg-base); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Layout ── */
    .shell { display: flex; height: 100%; }

    #tool-frame {
      flex: 1;
      border: none;
      background: var(--bg-base);
      min-width: 0;
    }

    /* ── Left rail (default) ── */
    #nav-rail {
      width: var(--rail-width);
      background: var(--bg-nav);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
      flex-shrink: 0;
    }

    #nav-rail .nav-settings { margin-top: auto; }

    #nav-bar { display: none; }

    /* ── Nav items (shared) ── */
    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }

    /* Rail item sizing */
    #nav-rail .nav-item { width: 40px; height: 40px; }

    .nav-item:hover  { background: var(--bg-hover); color: var(--text-dim); }
    .nav-item.active { background: var(--bg-active); color: var(--accent); }

    /* Rail active indicator — right edge */
    #nav-rail .nav-item.active::after {
      content: '';
      position: absolute;
      right: -1px; top: 8px; bottom: 8px;
      width: 3px;
      background: var(--accent);
      border-radius: 2px 0 0 2px;
    }

    /* Disabled settings button */
    .nav-item[aria-disabled="true"] { opacity: 0.4; cursor: default; pointer-events: none; }

    /* Tooltip (rail only) */
    .nav-tooltip {
      position: absolute;
      left: calc(var(--rail-width) + 4px);
      top: 50%; transform: translateY(-50%);
      background: #1a1d2e;
      color: var(--text);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 200;
    }
    .nav-item:hover .nav-tooltip { opacity: 1; }

    /* ── Mobile portrait ── */
    @media (max-width: 600px) and (orientation: portrait) {
      .shell { flex-direction: column; }

      #nav-rail { display: none; }

      #nav-bar {
        display: flex;
        order: 2;               /* bar below iframe */
        height: var(--bar-height);
        background: var(--bg-nav);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      #tool-frame { order: 1; height: calc(100% - var(--bar-height)); }

      /* Bar item sizing */
      #nav-bar .nav-item {
        flex: 1;
        flex-direction: column;
        height: 100%;
        gap: 3px;
        border-radius: 0;
        font-size: 10px;
        color: var(--text-muted);
      }

      #nav-bar .nav-label {
        font-size: 10px;
        line-height: 1;
      }

      /* Bar active indicator — top edge */
      #nav-bar .nav-item.active::before {
        content: '';
        position: absolute;
        top: 0; left: 8px; right: 8px;
        height: 3px;
        background: var(--accent);
        border-radius: 0 0 2px 2px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav id="nav-rail" aria-label="Tools"></nav>
    <iframe id="tool-frame" title="Tool" src=""></iframe>
    <nav id="nav-bar" aria-label="Tools"></nav>
  </div>
  <script src="shell.js"></script>
</body>
</html>
