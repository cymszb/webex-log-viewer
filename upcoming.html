<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0d14;
      --text:       #d4d8e1;
      --text-dim:   #a0b8d8;
      --text-muted: #5a6080;
    }

    [data-theme="light"] {
      --bg-base:    #f4f5f7;
      --text:       #1a1d2e;
      --text-dim:   #4a63cc;
      --text-muted: #8b95a5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    h1 { font-size: 22px; font-weight: 600; color: var(--text-dim); }
    p  { font-size: 14px; color: var(--text-muted); }
  </style>
</head>
<body>
  <script>
    // Redirect to shell if loaded as top-level document (not inside iframe)
    if (window.self === window.top) {
      const params = new URLSearchParams(location.search);
      // Find the matching tool by label, fall back to first tool
      fetch('tools.json')
        .then(r => r.json())
        .then(tools => {
          const name = params.get('name') || '';
          const match = tools.find(t => t.label === name) || tools[0];
          location.replace('shell.html?tool=' + match.id);
        })
        .catch(() => location.replace('shell.html'));
    }
  </script>
  <h1 id="tool-name">Coming Soon</h1>
  <p>This tool is not yet available.</p>
  <script>
    const n = new URLSearchParams(location.search).get('name');
    if (n) document.getElementById('tool-name').textContent = n;
  </script>
  <script>
(function() {
  var THEME_KEY = 'theme';
  function apply(theme) {
    document.documentElement.setAttribute('data-theme', theme);
  }
  apply(localStorage.getItem(THEME_KEY) || 'dark');
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'set-theme') {
      apply(e.data.theme);
    }
  });
})();
  </script>
</body>
</html>
